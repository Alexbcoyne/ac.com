<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Check - AC.com</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      padding: 40px;
      max-width: 500px;
      width: 100%;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 28px;
      color: #333;
    }

    .status-display {
      text-align: center;
      padding: 30px;
      border-radius: 8px;
      margin-bottom: 30px;
      transition: all 0.3s ease;
    }

    .status-display.up {
      background: #d4edda;
      border: 2px solid #28a745;
    }

    .status-display.down {
      background: #f8d7da;
      border: 2px solid #dc3545;
    }

    .status-icon {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .status-text {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .status-display.up .status-text {
      color: #155724;
    }

    .status-display.down .status-text {
      color: #721c24;
    }

    .status-time {
      font-size: 14px;
      opacity: 0.8;
    }

    .instructions {
      background: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      font-size: 13px;
      line-height: 1.6;
    }

    .instructions h3 {
      margin-bottom: 10px;
      font-size: 14px;
      color: #333;
    }

    code {
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 12px;
    }

    .console-commands {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #ddd;
    }

    .console-commands p {
      margin-bottom: 8px;
    }

    .command-example {
      background: #f0f0f0;
      padding: 8px;
      border-radius: 4px;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 12px;
      margin-top: 5px;
      word-break: break-all;
      color: #d63384;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #0056b3;
    }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Health Check</h1>

    <div id="statusDisplay" class="status-display up">
      <div class="status-icon" id="statusIcon">✅</div>
      <div class="status-text" id="statusText">UP</div>
      <div class="status-time" id="statusTime"></div>
    </div>

    <div class="instructions">
      <h3>📋 Instructions</h3>
      <p>This is a simple demo to test uptime monitoring. Toggle the status using your browser console:</p>

      <div class="console-commands">
        <p><strong>To toggle status:</strong></p>
        <div class="command-example">toggleStatus()</div>

        <p><strong>To check current status:</strong></p>
        <div class="command-example">checkStatus()</div>
      </div>
    </div>

    <button onclick="toggleStatus()">Toggle Status</button>
  </div>

  <script>
    const HEALTH_CHECK_URL = '/api/health-check';
    const TOGGLE_URL = '/api/health-check-toggle';

    // Update display based on actual API response
    async function updateDisplay() {
      try {
        const res = await fetch(HEALTH_CHECK_URL);
        const data = await res.json();
        const display = document.getElementById('statusDisplay');
        const icon = document.getElementById('statusIcon');
        const text = document.getElementById('statusText');
        const time = document.getElementById('statusTime');

        if (res.ok && data.status === 'up') {
          display.classList.remove('down');
          display.classList.add('up');
          icon.textContent = '✅';
          text.textContent = 'UP';
        } else {
          display.classList.remove('up');
          display.classList.add('down');
          icon.textContent = '❌';
          text.textContent = 'DOWN';
        }

        time.textContent = new Date().toLocaleTimeString();
      } catch (err) {
        document.getElementById('statusDisplay').classList.add('down');
        document.getElementById('statusIcon').textContent = '⚠️';
        document.getElementById('statusText').textContent = 'ERROR';
        console.error('Failed to check status:', err);
      }
    }

    // Console commands
    window.toggleStatus = async function() {
      try {
        const res = await fetch(TOGGLE_URL, { method: 'POST' });
        const data = await res.json();
        console.log(`✅ Status toggled: ${data.currentStatus.toUpperCase()}`);
        await updateDisplay();
      } catch (err) {
        console.error('Failed to toggle status:', err);
      }
    };

    window.checkStatus = async function() {
      try {
        const res = await fetch(HEALTH_CHECK_URL);
        const data = await res.json();
        console.log(`Current status: ${data.status.toUpperCase()} (HTTP ${res.status}, source: ${data.source || 'unknown'})`);
        return data.status;
      } catch (err) {
        console.error('Failed to check status:', err);
      }
    };

    // Initial display and update every 2 seconds
    updateDisplay();
    setInterval(updateDisplay, 2000);

    // Log helper message
    console.log('%c✨ AC.com Health Check Demo ✨', 'font-size: 16px; font-weight: bold; color: #007bff;');
    console.log('Available commands:');
    console.log('  • toggleStatus() - Toggle service status');
    console.log('  • checkStatus()  - Check current HTTP status');
    console.log('External test URL for non-200: /api/health-check?force=down');
  </script>
</body>
</html>
